<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders - WebGL</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 1px solid #0f0; }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const gl = canvas.getContext('webgl');

    if (!gl) {
      alert('WebGL not supported');
    }

    // Simple shader program for colored rectangles
    const vsSource = `
      attribute vec2 a_position;
      uniform vec2 u_resolution;
      void main() {
        vec2 zeroToOne = a_position / u_resolution;
        vec2 clipSpace = zeroToOne * 2.0 - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
      }
    `;

    const fsSource = `
      precision mediump float;
      uniform vec4 u_color;
      void main() {
        gl_FragColor = u_color;
      }
    `;

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
    const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);

    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(program));
    }

    gl.useProgram(program);

    const positionLocation = gl.getAttribLocation(program, 'a_position');
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    const colorLocation = gl.getUniformLocation(program, 'u_color');

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

    gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

    // Game state
    let player = { x: 380, y: 550, w: 40, h: 20 };
    let invaders = [];
    let bullets = [];
    let keys = {};
    let lastShot = 0;

    // Initialize invaders
    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 8; col++) {
        invaders.push({
          x: 100 + col * 70,
          y: 80 + row * 50,
          w: 40,
          h: 30,
          alive: true
        });
      }
    }

    let invaderDir = 1;
    let invaderSpeed = 1;

    function drawRect(x, y, w, h, color) {
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      const vertices = [
        x, y,
        x + w, y,
        x, y + h,
        x, y + h,
        x + w, y,
        x + w, y + h
      ];
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
      gl.uniform4f(colorLocation, color[0], color[1], color[2], 1.0);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function update() {
      // Player movement
      if (keys['ArrowLeft']) player.x = Math.max(0, player.x - 5);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + 5);

      // Shooting
      const now = Date.now();
      if (keys[' '] && now - lastShot > 300) {
        bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
        lastShot = now;
      }

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= 8;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      // Invaders movement
      let edgeHit = false;
      for (let inv of invaders) {
        if (!inv.alive) continue;
        inv.x += invaderDir * invaderSpeed;
        if (inv.x < 0 || inv.x + inv.w > canvas.width) edgeHit = true;
      }
      if (edgeHit) {
        invaderDir *= -1;
        for (let inv of invaders) {
          if (inv.alive) inv.y += 20;
        }
      }

      // Collision
      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let inv of invaders) {
          if (!inv.alive) continue;
          if (bullets[i].x < inv.x + inv.w &&
              bullets[i].x + bullets[i].w > inv.x &&
              bullets[i].y < inv.y + inv.h &&
              bullets[i].y + bullets[i].h > inv.y) {
            inv.alive = false;
            bullets.splice(i, 1);
            break;
          }
        }
      }

      // Win/lose check (simplified)
    }

    function render() {
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      // Player (green)
      drawRect(player.x, player.y, player.w, player.h, [0, 1, 0]);

      // Invaders (red)
      for (let inv of invaders) {
        if (inv.alive) {
          drawRect(inv.x, inv.y, inv.w, inv.h, [1, 0, 0]);
        }
      }

      // Bullets (white)
      for (let b of bullets) {
        drawRect(b.x, b.y, b.w, b.h, [1, 1, 1]);
      }
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    // Keyboard
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // Start
    gameLoop();
    console.log('Space Invaders WebGL started!');
  </script>
</body>
</html>
