<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders - Canvas (90s Pixel Art)</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: monospace; }
    #score { font-size: 24px; margin-bottom: 10px; }
    canvas { border: 1px solid #0f0; image-rendering: pixelated; background: #000; }
  </style>
</head>
<body>
  <div id="score">SCORE: 00000</div>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: true });
    const scoreEl = document.getElementById('score');

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      if (type === 'shoot') {
        osc.frequency.value = 660;
        osc.type = 'triangle';
        gain.gain.value = 0.2;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
      } else if (type === 'hit') {
        osc.frequency.value = 180;
        osc.type = 'sine';
        gain.gain.value = 0.35;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
      }
      osc.start();
      setTimeout(() => osc.stop(), 500);
    }

    // Load images
    const images = {};
    let imagesLoaded = 0;
    const totalImages = 5;

    function loadImage(name, src) {
      const img = new Image();
      img.src = src;
      img.onload = () => {
        images[name] = img;
        imagesLoaded++;
      };
      img.onerror = () => console.warn(`${src} failed to load`);
    }

    loadImage('spaceship', 'spaceship.png');
    loadImage('invader', 'invader1.png');
    loadImage('explosion1', 'explosion1.png');
    loadImage('explosion2', 'explosion2.png');
    loadImage('explosion3', 'explosion3.png');

    // Game state
    let player = { x: 380, y: 550, w: 48, h: 24 };
    let invaders = [];
    let bullets = [];
    let explosions = [];
    let keys = {};
    let lastShot = 0;
    let score = 0;
    let gameOver = false;
    let wave = 1;
    let lastTime = 0;

    function createWave(waveNum) {
      invaders = [];
      const rows = Math.min(4 + Math.floor(waveNum / 3), 6);
      const cols = 8;
      const startY = 60 + (waveNum - 1) * 10;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          invaders.push({
            x: 80 + col * 80,
            y: startY + row * 45,
            w: 48,
            h: 24,
            alive: true
          });
        }
      }
    }

    function resetGame() {
      player.x = 380;
      wave = 1;
      createWave(wave);
      bullets = [];
      explosions = [];
      score = 0;
      gameOver = false;
      updateScore();
    }

    createWave(1);

    let invaderDir = 1;
    let invaderSpeed = 1.5;

    function updateScore() {
      if (gameOver) {
        scoreEl.textContent = `WAVE ${wave} - GAME OVER - PRESS SPACE`;
      } else {
        scoreEl.textContent = `WAVE ${wave}  SCORE: ${score.toString().padStart(5, '0')}`;
      }
    }

    function update(dt) {
      if (gameOver) return;

      if (keys['ArrowLeft']) player.x = Math.max(0, player.x - 5);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + 5);

      const now = Date.now();
      if (keys[' '] && now - lastShot > 200) {
        bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
        playSound('shoot');
        lastShot = now;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= 10;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      let edgeHit = false;
      for (let inv of invaders) {
        if (!inv.alive) continue;
        inv.x += invaderDir * invaderSpeed;
        if (inv.x < 0 || inv.x + inv.w > canvas.width) edgeHit = true;
      }
      if (edgeHit) {
        invaderDir *= -1;
        for (let inv of invaders) if (inv.alive) inv.y += 20;
      }

      for (let inv of invaders) {
        if (inv.alive && inv.y + inv.h > player.y) {
          gameOver = true;
          updateScore();
          return;
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let inv of invaders) {
          if (!inv.alive) continue;
          if (bullets[i].x < inv.x + inv.w && bullets[i].x + bullets[i].w > inv.x &&
              bullets[i].y < inv.y + inv.h && bullets[i].y + bullets[i].h > inv.y) {
            inv.alive = false;
            bullets.splice(i, 1);
            score += 100;
            updateScore();
            playSound('hit');
            explosions.push({ x: inv.x, y: inv.y, frame: 0, timer: 0 });
            break;
          }
        }
      }

      const aliveInvaders = invaders.filter(i => i.alive).length;
      if (aliveInvaders === 0) {
        wave++;
        createWave(wave);
        invaderDir = 1;
        updateScore();
      }

      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer += dt;
        if (explosions[i].timer > 80) {
          explosions[i].frame++;
          explosions[i].timer = 0;
        }
        if (explosions[i].frame >= 3) {
          explosions.splice(i, 1);
        }
      }
    }

    function render() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Player
      if (images.spaceship) {
        ctx.drawImage(images.spaceship, player.x, player.y, player.w, player.h);
      } else {
        ctx.fillStyle = '#0f0';
        ctx.fillRect(player.x, player.y, player.w, player.h);
      }

      // Invaders
      for (let inv of invaders) {
        if (inv.alive) {
          if (images.invader) {
            ctx.drawImage(images.invader, inv.x, inv.y, inv.w, inv.h);
          } else {
            ctx.fillStyle = '#f0f';
            ctx.fillRect(inv.x, inv.y, inv.w, inv.h);
          }
        }
      }

      // Bullets
      ctx.fillStyle = '#fff';
      for (let b of bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      // Explosions
      for (let exp of explosions) {
        const expImg = images[`explosion${exp.frame + 1}`];
        if (expImg) {
          ctx.drawImage(expImg, exp.x, exp.y, 48, 32);
        }
      }
    }

    function updateScoreDOM() {
      updateScore();
    }

    function gameLoop(timestamp = 0) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt || 16);
      render();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (gameOver && e.key === ' ') {
        resetGame();
      }
    });
    window.addEventListener('keyup', e => keys[e.key] = false);

    function startGame() {
      if (imagesLoaded < totalImages) {
        setTimeout(startGame, 100);
        return;
      }
      updateScoreDOM();
      console.log('Canvas 2D Space Invaders ready!');
      gameLoop();
    }

    startGame();
  </script>
</body>
</html>
