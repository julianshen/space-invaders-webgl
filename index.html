<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders - Phaser</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  <script>
    const config = {
      type: Phaser.AUTO,
      width: 800,
      height: 600,
      backgroundColor: '#000000',
      pixelArt: true,
      physics: {
        default: 'arcade',
        arcade: {
          debug: false
        }
      },
      scene: {
        preload: preload,
        create: create,
        update: update
      }
    };

    const game = new Phaser.Game(config);

    let player;
    let cursors;
    let bullets;
    let invaders;
    let explosions;
    let score = 0;
    let wave = 1;
    let scoreText;
    let gameOver = false;
    let lastShot = 0;

    function preload() {
      this.load.image('spaceship', 'spaceship.png');
      this.load.image('invader', 'invader1.png');
      this.load.image('explosion1', 'explosion1.png');
      this.load.image('explosion2', 'explosion2.png');
      this.load.image('explosion3', 'explosion3.png');
    }

    function create() {
      // Player
      player = this.physics.add.sprite(400, 550, 'spaceship');
      player.setCollideWorldBounds(true);

      cursors = this.input.keyboard.createCursorKeys();
      this.input.keyboard.on('keydown-SPACE', shoot, this);

      // Groups
      bullets = this.physics.add.group();
      invaders = this.physics.add.group();
      explosions = this.add.group();

      // Score
      scoreText = this.add.text(16, 16, 'WAVE 1  SCORE: 00000', {
        fontFamily: 'monospace',
        fontSize: '24px',
        color: '#00ff00'
      });

      createWave.call(this, 1);

      // Collisions
      this.physics.add.overlap(bullets, invaders, hitInvader, null, this);
    }

    function createWave(waveNum) {
      invaders.clear(true, true);

      const rows = Math.min(4 + Math.floor(waveNum / 3), 6);
      const cols = 8;
      const startY = 80 + (waveNum - 1) * 15;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const inv = invaders.create(100 + col * 80, startY + row * 50, 'invader');
          inv.setVelocityX(80 + waveNum * 15);
        }
      }
    }

    function shoot() {
      if (gameOver) return;
      const now = this.time.now;
      if (now - lastShot < 200) return;

      const bullet = bullets.create(player.x, player.y - 20, 'bullet');
      if (bullet) {
        bullet.setVelocityY(-400);
        bullet.setSize(4, 10);
      }
      lastShot = now;
      // playSound('shoot'); // 可之後加上
    }

    function hitInvader(bullet, invader) {
      bullet.destroy();
      invader.destroy();

      score += 100;
      updateScoreText();

      // Explosion
      const exp = explosions.create(invader.x, invader.y, 'explosion1');
      exp.play({ key: 'explode', repeat: 0 });
      this.time.delayedCall(300, () => {
        if (exp) exp.destroy();
      });

      // Check wave clear
      if (invaders.countActive(true) === 0) {
        wave++;
        updateScoreText();
        this.time.delayedCall(800, () => {
          createWave.call(this, wave);
        });
      }
    }

    function updateScoreText() {
      scoreText.setText(`WAVE ${wave}  SCORE: ${score.toString().padStart(5, '0')}`);
    }

    function update() {
      if (gameOver) return;

      // Player movement
      if (cursors.left.isDown) {
        player.setVelocityX(-200);
      } else if (cursors.right.isDown) {
        player.setVelocityX(200);
      } else {
        player.setVelocityX(0);
      }

      // Invader edge bounce
      let bounce = false;
      invaders.getChildren().forEach(inv => {
        if (inv.active) {
          if (inv.x < 30 || inv.x > 770) bounce = true;
          if (inv.y > 520) {
            gameOver = true;
            scoreText.setText(`WAVE ${wave} - GAME OVER - PRESS SPACE`);
          }
        }
      });

      if (bounce) {
        invaders.getChildren().forEach(inv => {
          if (inv.active) {
            inv.setVelocityX(inv.body.velocity.x * -1);
            inv.y += 20;
          }
        });
      }

      // Clean bullets
      bullets.getChildren().forEach(b => {
        if (b.y < 0) b.destroy();
      });
    }

    // Restart
    window.addEventListener('keydown', e => {
      if (gameOver && e.key === ' ') {
        location.reload();
      }
    });
  </script>
</body>
</html>
