<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders</title>
  <style>
    body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  <script>
    const config = {
      type: Phaser.AUTO,
      width: 800,
      height: 600,
      backgroundColor: '#000000',
      pixelArt: true,
      physics: {
        default: 'arcade',
        arcade: { debug: false }
      },
      scene: {
        preload: preload,
        create: create,
        update: update
      }
    };

    const game = new Phaser.Game(config);

    let player;
    let cursors;
    let bullets;
    let invaders;
    let explosions;
    let score = 0;
    let wave = 1;
    let scoreText;
    let gameOver = false;
    let lastShot = 0;
    let invaderSpeed = 80;

    function preload() {
      this.load.image('spaceship', 'spaceship.png');
      this.load.image('invader', 'invader1.png');
      this.load.image('explosion1', 'explosion1.png');
      this.load.image('explosion2', 'explosion2.png');
      this.load.image('explosion3', 'explosion3.png');
    }

    function create() {
      // 用程式生成子彈貼圖（綠色的長條）
      const bulletGfx = this.textures.createCanvas('bullet', 4, 10);
      const ctx = bulletGfx.getContext();
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(0, 0, 4, 10);
      bulletGfx.refresh();

      // Player - 強制設定合理尺寸
      player = this.physics.add.sprite(400, 550, 'spaceship');
      player.setDisplaySize(48, 24);
      player.setCollideWorldBounds(true);

      cursors = this.input.keyboard.createCursorKeys();
      this.input.keyboard.on('keydown-SPACE', shoot, this);

      bullets = this.physics.add.group();
      invaders = this.physics.add.group();
      explosions = this.add.group();

      scoreText = this.add.text(16, 16, 'WAVE 1   SCORE: 00000', {
        fontFamily: 'monospace',
        fontSize: '22px',
        color: '#00ff00'
      });

      this.anims.create({
        key: 'explode',
        frames: [
          { key: 'explosion1' },
          { key: 'explosion2' },
          { key: 'explosion3' }
        ],
        frameRate: 12,
        hideOnComplete: true
      });

      createWave.call(this, 1);
      this.physics.add.overlap(bullets, invaders, hitInvader, null, this);
    }

    function createWave(waveNum) {
      invaders.clear(true, true);

      const rows = Math.min(4 + Math.floor(waveNum / 3), 6);
      const cols = 8;
      const spacingX = 68;
      const startX = 110;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const inv = invaders.create(startX + col * spacingX, 90 + row * 55, 'invader');
          inv.setDisplaySize(42, 24);
          // 隨機初始方向，讓敵人不會全部同方向移動
          const dir = (Math.random() > 0.5) ? 1 : -1;
          inv.setVelocityX((invaderSpeed + (waveNum - 1) * 18) * dir);
          // 記錄每隻敵人的原始 row，用來做階梯式掉落
          inv.setData('row', row);
        }
      }
    }

    function shoot() {
      if (gameOver) return;
      const now = this.time.now;
      if (now - lastShot < 180) return;

      const bullet = bullets.create(player.x, player.y - 10, 'bullet');
      if (bullet) {
        bullet.setVelocityY(-450);
        bullet.setSize(4, 10);
        bullet.setDisplaySize(4, 10);
      }
      lastShot = now;
    }

    function hitInvader(bullet, invader) {
      bullet.destroy();
      invader.destroy();

      score += 100;
      updateScoreText();

      const exp = explosions.create(invader.x, invader.y);
      exp.play('explode');

      if (invaders.countActive(true) === 0) {
        wave++;
        updateScoreText();
        this.time.delayedCall(700, () => {
          createWave.call(this, wave);
        });
      }
    }

    function updateScoreText() {
      scoreText.setText(`WAVE ${wave}   SCORE: ${score.toString().padStart(5, '0')}`);
    }

    function update() {
      if (gameOver) return;

      if (cursors.left.isDown) {
        player.setVelocityX(-220);
      } else if (cursors.right.isDown) {
        player.setVelocityX(220);
      } else {
        player.setVelocityX(0);
      }

      let bounce = false;
      let side = 'none';
      invaders.getChildren().forEach(inv => {
        if (inv.active && inv.x < 40) {
          bounce = true;
          side = 'left';
        }
        if (inv.active && inv.x > 760) {
          bounce = true;
          side = 'right';
        }
        if (inv.active && inv.y > 530) {
          gameOver = true;
          scoreText.setText(`WAVE ${wave} - GAME OVER - PRESS SPACE`);
        }
      });

      if (bounce) {
        invaders.getChildren().forEach(inv => {
          if (inv.active) {
            // 反彈後速度稍微加快（越打越快，但幅度小一點）
            const currentSpeed = Math.abs(inv.body.velocity.x);
            const newSpeed = Math.min(currentSpeed + 2, 220);
            const dir = side === 'left' ? 1 : -1;
            inv.setVelocityX(newSpeed * dir);
            // 階梯式掉落：後排掉得少，前排掉得多
            const row = inv.getData('row') || 0;
            const dropAmount = 6 + row * 1.5;
            inv.y += dropAmount;
          }
        });
      }

      bullets.getChildren().forEach(b => {
        if (b.y < 0) b.destroy();
      });
    }

    window.addEventListener('keydown', e => {
      if (gameOver && e.key === ' ') {
        location.reload();
      }
    });
  </script>
</body>
</html>
