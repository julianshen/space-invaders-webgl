<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders - WebGL (90s Pixel Art)</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: monospace; }
    #score { font-size: 24px; margin-bottom: 10px; }
    canvas { border: 1px solid #0f0; image-rendering: pixelated; }
  </style>
</head>
<body>
  <div id="score">SCORE: 00000</div>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const gl = canvas.getContext('webgl');
    const scoreEl = document.getElementById('score');

    if (!gl) {
      alert('WebGL not supported');
      throw new Error('WebGL not supported');
    }

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      if (type === 'shoot') {
        osc.frequency.value = 660;
        osc.type = 'triangle';
        gain.gain.value = 0.2;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
      } else if (type === 'hit') {
        osc.frequency.value = 180;
        osc.type = 'sine';
        gain.gain.value = 0.35;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
      }
      osc.start();
      setTimeout(() => osc.stop(), 500);
    }

    // Shaders
    const colorVS = `
      attribute vec2 a_position;
      uniform vec2 u_resolution;
      void main() {
        vec2 zeroToOne = a_position / u_resolution;
        vec2 clipSpace = zeroToOne * 2.0 - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
      }
    `;
    const colorFS = `
      precision mediump float;
      uniform vec4 u_color;
      void main() {
        gl_FragColor = u_color;
      }
    `;

    const texVS = `
      attribute vec2 a_position;
      attribute vec2 a_texcoord;
      uniform vec2 u_resolution;
      varying vec2 v_texcoord;
      void main() {
        vec2 zeroToOne = a_position / u_resolution;
        vec2 clipSpace = zeroToOne * 2.0 - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
        v_texcoord = a_texcoord;
      }
    `;
    const texFS = `
      precision mediump float;
      varying vec2 v_texcoord;
      uniform sampler2D u_texture;
      void main() {
        gl_FragColor = texture2D(u_texture, v_texcoord);
      }
    `;

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    function createProgram(gl, vs, fs) {
      const program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error('Program link error:', gl.getProgramInfoLog(program));
        gl.deleteProgram(program);
        return null;
      }
      return program;
    }

    const colorVertexShader = createShader(gl, gl.VERTEX_SHADER, colorVS);
    const colorFragmentShader = createShader(gl, gl.FRAGMENT_SHADER, colorFS);
    const colorProgram = createProgram(gl, colorVertexShader, colorFragmentShader);

    const texVertexShader = createShader(gl, gl.VERTEX_SHADER, texVS);
    const texFragmentShader = createShader(gl, gl.FRAGMENT_SHADER, texFS);
    const texProgram = createProgram(gl, texVertexShader, texFragmentShader);

    if (!colorProgram || !texProgram) {
      alert('Failed to initialize WebGL programs');
      throw new Error('WebGL program creation failed');
    }

    const positionBuffer = gl.createBuffer();
    const texcoordBuffer = gl.createBuffer();

    // Color program locations
    const colorPositionLoc = gl.getAttribLocation(colorProgram, 'a_position');
    const colorResolutionLoc = gl.getUniformLocation(colorProgram, 'u_resolution');
    const colorColorLoc = gl.getUniformLocation(colorProgram, 'u_color');

    // Texture program locations
    const texPositionLoc = gl.getAttribLocation(texProgram, 'a_position');
    const texTexcoordLoc = gl.getAttribLocation(texProgram, 'a_texcoord');
    const texResolutionLoc = gl.getUniformLocation(texProgram, 'u_resolution');
    const texTextureLoc = gl.getUniformLocation(texProgram, 'u_texture');

    // Set resolution uniforms
    gl.useProgram(colorProgram);
    gl.uniform2f(colorResolutionLoc, canvas.width, canvas.height);

    gl.useProgram(texProgram);
    gl.uniform2f(texResolutionLoc, canvas.width, canvas.height);

    // Textures
    function loadTexture(img, callback) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
      callback(tex);
    }

    const spaceshipImg = new Image();
    spaceshipImg.src = 'spaceship.png';
    let spaceshipTexture = null;
    spaceshipImg.onload = () => loadTexture(spaceshipImg, t => spaceshipTexture = t);
    spaceshipImg.onerror = () => console.warn('spaceship.png failed to load');

    const invaderImg = new Image();
    invaderImg.src = 'invader1.png';
    let invaderTexture = null;
    invaderImg.onload = () => loadTexture(invaderImg, t => invaderTexture = t);
    invaderImg.onerror = () => console.warn('invader1.png failed to load');

    const explosionImgs = [new Image(), new Image(), new Image()];
    explosionImgs[0].src = 'explosion1.png';
    explosionImgs[1].src = 'explosion2.png';
    explosionImgs[2].src = 'explosion3.png';
    let explosionTextures = [null, null, null];
    explosionImgs.forEach((img, i) => {
      img.onload = () => loadTexture(img, t => explosionTextures[i] = t);
      img.onerror = () => console.warn(`explosion${i+1}.png failed to load`);
    });

    // Game state
    let player = { x: 380, y: 550, w: 48, h: 24 };
    let invaders = [];
    let bullets = [];
    let explosions = [];
    let keys = {};
    let lastShot = 0;
    let score = 0;
    let gameOver = false;
    let wave = 1;
    let lastTime = 0;

    function createWave(waveNum) {
      invaders = [];
      const rows = Math.min(4 + Math.floor(waveNum / 3), 6);
      const cols = 8;
      const startY = 60 + (waveNum - 1) * 10;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          invaders.push({
            x: 80 + col * 80,
            y: startY + row * 45,
            w: 48,
            h: 24,
            alive: true
          });
        }
      }
      invaderSpeed = 1.2 + (waveNum - 1) * 0.25;
    }

    function resetGame() {
      player.x = 380;
      wave = 1;
      createWave(wave);
      bullets = [];
      explosions = [];
      score = 0;
      gameOver = false;
      updateScore();
    }

    function initInvaders() {
      createWave(1);
    }
    initInvaders();

    let invaderDir = 1;
    let invaderSpeed = 1.5;

    function drawColoredRect(x, y, w, h, color) {
      gl.useProgram(colorProgram);
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      const vertices = [x, y, x + w, y, x, y + h, x, y + h, x + w, y, x + w, y + h];
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(colorPositionLoc);
      gl.vertexAttribPointer(colorPositionLoc, 2, gl.FLOAT, false, 0, 0);
      gl.uniform4f(colorColorLoc, color[0], color[1], color[2], 1.0);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function drawTexturedRect(x, y, w, h, texture) {
      if (!texture) return;
      gl.useProgram(texProgram);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.uniform1i(texTextureLoc, 0);

      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      const vertices = [x, y, x + w, y, x, y + h, x, y + h, x + w, y, x + w, y + h];
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(texPositionLoc);
      gl.vertexAttribPointer(texPositionLoc, 2, gl.FLOAT, false, 0, 0);

      gl.bindBuffer(gl.ARRAY_BUFFER, texcoordBuffer);
      const texcoords = [0, 0, 1, 0, 0, 1, 0, 1, 1, 0, 1, 1];
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texcoords), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(texTexcoordLoc);
      gl.vertexAttribPointer(texTexcoordLoc, 2, gl.FLOAT, false, 0, 0);

      gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function updateScore() {
      if (gameOver) {
        scoreEl.textContent = `WAVE ${wave} - GAME OVER - PRESS SPACE`;
      } else {
        scoreEl.textContent = `WAVE ${wave}  SCORE: ${score.toString().padStart(5, '0')}`;
      }
    }

    function update(dt) {
      if (gameOver) return;

      if (keys['ArrowLeft']) player.x = Math.max(0, player.x - 5);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + 5);

      const now = Date.now();
      if (keys[' '] && now - lastShot > 200) {
        bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
        playSound('shoot');
        lastShot = now;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= 10;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      let edgeHit = false;
      for (let inv of invaders) {
        if (!inv.alive) continue;
        inv.x += invaderDir * invaderSpeed;
        if (inv.x < 0 || inv.x + inv.w > canvas.width) edgeHit = true;
      }
      if (edgeHit) {
        invaderDir *= -1;
        for (let inv of invaders) if (inv.alive) inv.y += 20;
      }

      for (let inv of invaders) {
        if (inv.alive && inv.y + inv.h > player.y) {
          gameOver = true;
          updateScore();
          return;
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let inv of invaders) {
          if (!inv.alive) continue;
          if (bullets[i].x < inv.x + inv.w && bullets[i].x + bullets[i].w > inv.x &&
              bullets[i].y < inv.y + inv.h && bullets[i].y + bullets[i].h > inv.y) {
            inv.alive = false;
            bullets.splice(i, 1);
            score += 100;
            updateScore();
            playSound('hit');
            explosions.push({ x: inv.x, y: inv.y, frame: 0, timer: 0 });
            break;
          }
        }
      }

      const aliveInvaders = invaders.filter(i => i.alive).length;
      if (aliveInvaders === 0) {
        wave++;
        createWave(wave);
        invaderDir = 1;
        updateScore();
      }

      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer += dt;
        if (explosions[i].timer > 80) {
          explosions[i].frame++;
          explosions[i].timer = 0;
        }
        if (explosions[i].frame >= 3) {
          explosions.splice(i, 1);
        }
      }
    }

    function render() {
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      if (spaceshipTexture) {
        drawTexturedRect(player.x, player.y, player.w, player.h, spaceshipTexture);
      } else {
        drawColoredRect(player.x, player.y, player.w, player.h, [0, 1, 0]);
      }

      for (let inv of invaders) {
        if (inv.alive) {
          if (invaderTexture) {
            drawTexturedRect(inv.x, inv.y, inv.w, inv.h, invaderTexture);
          } else {
            drawColoredRect(inv.x, inv.y, inv.w, inv.h, [1, 0, 0]);
          }
        }
      }

      for (let b of bullets) {
        drawColoredRect(b.x, b.y, b.w, b.h, [1, 1, 1]);
      }

      for (let exp of explosions) {
        const tex = explosionTextures[exp.frame];
        if (tex) {
          drawTexturedRect(exp.x, exp.y, 48, 32, tex);
        }
      }
    }

    function gameLoop(timestamp = 0) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt || 16);
      render();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (gameOver && e.key === ' ') {
        resetGame();
      }
    });
    window.addEventListener('keyup', e => keys[e.key] = false);

    updateScore();
    console.log('Space Invaders with robust initialization ready!');
    gameLoop();
  </script>
</body>
</html>
