<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pathway+Gothic+One&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pathway+Gothic+One&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0806;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* ===== Toast Notification ===== */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      pointer-events: none;
    }
    .toast {
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #333;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 10px rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .toast.crt-off {
      border-color: #ff4444;
      color: #ff4444;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(255,68,68,0.4);
    }
    .toast.crt-shader {
      border-color: #44ff44;
      color: #2ecc40;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(68,255,68,0.4);
    }
    .toast.crt-camera {
      border-color: #4488ff;
      color: #4488ff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(68,136,255,0.4);
    }

    /* ===== Cabinet (使用自訂 bezel 圖) ===== */
    .cabinet {
      position: relative;
      width: 800px;
      height: 600px;
      background: url('bezel.jpg?v=2') center/cover no-repeat;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.7);
    }

    /* 遊戲畫面區域 */
    .screen-area {
      position: absolute;
      top: 55px;
      left: 100px;
      width: 600px;
      height: 450px;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }

    .screen-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      line-height: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="toast-container">
    <div class="toast" id="crt-toast">CRT: OFF</div>
  </div>
  <div class="cabinet">
    <div class="screen-area" id="game-container">
      <div class="screen-wrapper"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
  <script src="crt-pipeline.js?v=2"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
