<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:site_name" content="Space Invaders — Neon CRT Arcade">
  <meta property="og:title" content="Space Invaders — Neon CRT Arcade">
  <meta property="og:description" content="A neon-soaked Space Invaders remake inside a glowing arcade cabinet, with a real WebGL CRT shader — scanlines, curvature, and RGB phosphor glow. Play free in your browser.">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Space Invaders — Neon CRT Arcade">
  <meta name="twitter:description" content="A neon-soaked Space Invaders remake with a real WebGL CRT shader — scanlines, curvature, RGB phosphor glow. Play free in your browser.">
  <meta name="twitter:image" content="https://julianshen.github.io/space-invaders-webgl/og-image.png">
  <meta name="twitter:image:alt" content="Neon arcade cabinet running a Space Invaders game with a glowing CRT screen.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pathway+Gothic+One&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pathway+Gothic+One&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0806;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    /* ===== Toast Notification ===== */
    .toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      pointer-events: none;
    }
    .toast {
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: #333;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 10px rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateY(-20px) scale(0.9);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .toast.crt-off {
      border-color: #ff4444;
      color: #ff4444;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(255,68,68,0.4);
    }
    .toast.crt-shader {
      border-color: #44ff44;
      color: #2ecc40;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(68,255,68,0.4);
    }
    .toast.crt-camera {
      border-color: #4488ff;
      color: #4488ff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px rgba(68,136,255,0.4);
    }

    /* ===== 全螢幕包裝層 ===== */
    /* 一般狀態不影響排版；進入全螢幕時填滿螢幕並置中，
       機台整體（bezel + 畫面）用 transform 等比縮放以保留對位。 */
    #stage {
      position: relative;
      line-height: 0;
    }
    #stage:fullscreen,
    #stage:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* ===== Cabinet (使用自訂 bezel 圖) ===== */
    .cabinet {
      position: relative;
      width: 1280px;
      height: 960px;
      background: url('bezel.jpg') center/cover no-repeat;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 15px 40px rgba(0,0,0,0.7);
      transform-origin: center center;
    }

    /* 遊戲畫面區域 */
    .screen-area {
      position: absolute;
      top: 100px;
      left: 240px;
      width: 800px;
      height: 600px;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div class="toast-container">
      <div class="toast" id="crt-toast">CRT: OFF</div>
    </div>
    <div class="cabinet">
      <div class="screen-area" id="game-container"></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.2.0/dist/phaser.min.js"></script>
  <script src="game-logic.js"></script>
  <script src="crt-pipeline.js"></script>
  <script src="script.js"></script>
</body>
</html>
