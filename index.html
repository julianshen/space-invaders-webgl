<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders - WebGL</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #0f0; font-family: monospace; }
    #score { font-size: 24px; margin-bottom: 10px; }
    canvas { border: 1px solid #0f0; }
  </style>
</head>
<body>
  <div id="score">SCORE: 00000</div>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const gl = canvas.getContext('webgl');
    const scoreEl = document.getElementById('score');

    if (!gl) alert('WebGL not supported');

    // Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      if (type === 'shoot') {
        osc.frequency.value = 660;
        osc.type = 'triangle';
        gain.gain.value = 0.2;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
      } else if (type === 'hit') {
        osc.frequency.value = 180;
        osc.type = 'sine';
        gain.gain.value = 0.35;
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
      }

      osc.start();
      setTimeout(() => osc.stop(), 500);
    }

    // Shaders
    const vsSource = `
      attribute vec2 a_position;
      uniform vec2 u_resolution;
      void main() {
        vec2 zeroToOne = a_position / u_resolution;
        vec2 clipSpace = zeroToOne * 2.0 - 1.0;
        gl_Position = vec4(clipSpace * vec2(1, -1), 0, 1);
      }
    `;
    const fsSource = `
      precision mediump float;
      uniform vec4 u_color;
      void main() {
        gl_FragColor = u_color;
      }
    `;

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
      }
      return shader;
    }

    const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
    const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
    const program = gl.createProgram();
    gl.attachShader(program, vertexShader);
    gl.attachShader(program, fragmentShader);
    gl.linkProgram(program);
    gl.useProgram(program);

    const positionLocation = gl.getAttribLocation(program, 'a_position');
    const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
    const colorLocation = gl.getUniformLocation(program, 'u_color');
    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.uniform2f(resolutionLocation, canvas.width, canvas.height);

    // Game state
    let player = { x: 380, y: 550, w: 40, h: 20 };
    let invaders = [];
    let bullets = [];
    let keys = {};
    let lastShot = 0;
    let score = 0;

    for (let row = 0; row < 4; row++) {
      for (let col = 0; col < 8; col++) {
        invaders.push({ x: 100 + col * 70, y: 80 + row * 50, w: 40, h: 30, alive: true });
      }
    }

    let invaderDir = 1;
    let invaderSpeed = 1.5;

    function drawRect(x, y, w, h, color) {
      gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
      const vertices = [x, y, x + w, y, x, y + h, x, y + h, x + w, y, x + w, y + h];
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(vertices), gl.STATIC_DRAW);
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
      gl.uniform4f(colorLocation, color[0], color[1], color[2], 1.0);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function drawPlayer(x, y) {
      // Main body (dark green)
      drawRect(x + 12, y + 4, 16, 12, [0.1, 0.6, 0.2]);
      // Left wing
      drawRect(x, y + 8, 14, 8, [0.0, 0.8, 0.3]);
      // Right wing
      drawRect(x + 26, y + 8, 14, 8, [0.0, 0.8, 0.3]);
      // Cockpit highlight
      drawRect(x + 17, y + 6, 6, 4, [0.6, 1.0, 0.6]);
    }

    function updateScore() {
      scoreEl.textContent = 'SCORE: ' + score.toString().padStart(5, '0');
    }

    function update() {
      if (keys['ArrowLeft']) player.x = Math.max(0, player.x - 5);
      if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.w, player.x + 5);

      const now = Date.now();
      if (keys[' '] && now - lastShot > 250) {
        bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
        playSound('shoot');
        lastShot = now;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= 9;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      let edgeHit = false;
      for (let inv of invaders) {
        if (!inv.alive) continue;
        inv.x += invaderDir * invaderSpeed;
        if (inv.x < 0 || inv.x + inv.w > canvas.width) edgeHit = true;
      }
      if (edgeHit) {
        invaderDir *= -1;
        for (let inv of invaders) if (inv.alive) inv.y += 18;
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        for (let inv of invaders) {
          if (!inv.alive) continue;
          if (bullets[i].x < inv.x + inv.w && bullets[i].x + bullets[i].w > inv.x &&
              bullets[i].y < inv.y + inv.h && bullets[i].y + bullets[i].h > inv.y) {
            inv.alive = false;
            bullets.splice(i, 1);
            score += 100;
            updateScore();
            playSound('hit');
            break;
          }
        }
      }
    }

    function render() {
      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      drawPlayer(player.x, player.y);
      for (let inv of invaders) if (inv.alive) drawRect(inv.x, inv.y, inv.w, inv.h, [1, 0, 0]);
      for (let b of bullets) drawRect(b.x, b.y, b.w, b.h, [1, 1, 1]);
    }

    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    updateScore();
    gameLoop();
    console.log('Space Invaders with nicer ship ready!');
  </script>
</body>
</html>
